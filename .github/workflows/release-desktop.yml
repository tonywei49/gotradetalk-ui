name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS release
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_UPDATER_ENDPOINTS: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Write production environment
        env:
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Missing required GitHub secret: VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          cat <<EOF > .env.production
          VITE_HUB_API_BASE_URL=https://api.gotradetalk.com
          VITE_DEFAULT_PUBLIC_HS=https://matrix.gotradetalk.com
          VITE_SUPABASE_URL=https://yxgszzdroetxjeabqown.supabase.co
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Build updater package
        run: npm run tauri:build:updater

      - name: Generate updater manifest
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          export UPDATER_VERSION="$VERSION"
          export UPDATER_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_VERSION}"
          export UPDATER_NOTES="Desktop release ${VERSION}."
          npm run tauri:manifest

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/GoTradeTalk_*.dmg
            src-tauri/target/release/bundle/macos/GoTradeTalk.app.tar.gz
            src-tauri/target/release/bundle/macos/GoTradeTalk.app.tar.gz.sig
            src-tauri/target/release/bundle/latest.json

  release-windows:
    name: Build Windows release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Write production environment
        env:
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_ANON_KEY)) {
            throw "Missing required GitHub secret: VITE_SUPABASE_ANON_KEY"
          }
          @"
          VITE_HUB_API_BASE_URL=https://api.gotradetalk.com
          VITE_DEFAULT_PUBLIC_HS=https://matrix.gotradetalk.com
          VITE_SUPABASE_URL=https://yxgszzdroetxjeabqown.supabase.co
          VITE_SUPABASE_ANON_KEY=$env:VITE_SUPABASE_ANON_KEY
          "@ | Set-Content .env.production

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri:build:windows

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/GoTradeTalk_*.msi
