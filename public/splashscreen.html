<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoTradeTalk</title>
    <style>
      :root {
        color-scheme: light;
        --bg0: #f7f3ea;
        --bg1: #e5dcc7;
        --ink: #17202b;
        --muted: #576274;
        --line: rgba(23, 32, 43, 0.12);
        --card: rgba(255, 252, 244, 0.86);
        --accent: #1f8f6a;
        --accent-soft: rgba(31, 143, 106, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "PingFang SC", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 45%),
          linear-gradient(145deg, var(--bg0), var(--bg1));
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 360px;
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 28px 26px 24px;
        background: var(--card);
        box-shadow: 0 18px 48px rgba(67, 57, 36, 0.14);
        backdrop-filter: blur(10px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.92);
        display: grid;
        place-items: center;
        overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      .brand-mark img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .brand-copy h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.05;
      }

      .brand-copy p {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      .status {
        margin-top: 26px;
      }

      .status-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 8px var(--accent-soft);
        animation: pulse 1.6s ease-out infinite;
      }

      .progress {
        margin-top: 14px;
        height: 9px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(23, 32, 43, 0.08);
      }

      .progress-bar {
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #12324f, #1f8f6a, #8bcf9f);
        animation: sweep 1.25s ease-in-out infinite;
        transform-origin: left center;
      }

      .hint {
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 var(--accent-soft);
        }

        100% {
          box-shadow: 0 0 0 12px rgba(31, 143, 106, 0);
        }
      }

      @keyframes sweep {
        0% {
          transform: translateX(-90%) scaleX(0.7);
        }

        50% {
          transform: translateX(80%) scaleX(1);
        }

        100% {
          transform: translateX(210%) scaleX(0.82);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Application loading">
        <div class="brand">
          <div class="brand-mark">
            <img src="/app-icon.ico" alt="GoTradeTalk icon" />
          </div>
          <div class="brand-copy">
            <h1>GoTradeTalk</h1>
            <p>Desktop workspace is starting</p>
          </div>
        </div>
        <div class="status">
          <div class="status-label">
            <span>Loading</span>
            <span class="status-dot" aria-hidden="true"></span>
          </div>
          <div class="progress" aria-hidden="true">
            <div class="progress-bar"></div>
          </div>
          <p class="hint">Initializing local storage, messaging runtime, and workspace shell.</p>
        </div>
      </section>
    </main>
  </body>
  </html>
