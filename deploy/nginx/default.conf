server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # static assets
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # basic health endpoint for platform checks
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }
}
